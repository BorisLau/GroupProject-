services:
  - type: keyvalue
    name: ccit4080-redis
    plan: free
    ipAllowList: []

  - type: web
    name: ccit4080-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ENV
        value: production
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ccit4080-redis
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: APP_ENCRYPTION_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: MAX_UPLOAD_SIZE_BYTES
        value: 10485760
      - key: LOCAL_MINDMAP_OUTPUT_DIR
        value: /tmp/mindmaps

  - type: worker
    name: ccit4080-worker
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A celery_worker.celery_app worker --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ENV
        value: production
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ccit4080-redis
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: APP_ENCRYPTION_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: MAX_UPLOAD_SIZE_BYTES
        value: 10485760
      - key: LOCAL_MINDMAP_OUTPUT_DIR
        value: /tmp/mindmaps
